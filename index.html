<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PMP® Exam Prep</title>
<link rel="shortcut icon" href="/images/app-icon.png">
<meta name="robots" content="index, follow">
<meta property="og:title" content="PMP® Exam Prep">
<meta property="og:image" content="https://pmp.nerdis.co.jp/images/logo.png">
<style>
body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
.loading { text-align: center; color: #666; }
</style>
<script>
(function() {
  var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  if (lang.startsWith('ja')) {
    window.location.replace('/ja/');
  } else if (lang.startsWith('zh')) {
    window.location.replace('/zh/');
  } else {
    window.location.replace('/en/');
  }
})();
</script>
</head>
<body>
<div class="loading">
<p>Redirecting...</p>
</div>
</body>
</html>
